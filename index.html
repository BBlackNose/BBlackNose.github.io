<div id="terminal-header" style="background: #121318; padding: 20px; border-radius: 10px; border: 1px solid var(--neon-purple); margin-bottom: 30px; font-family: 'Courier New', Courier, monospace;">
  <div style="color: var(--neon-green); margin-bottom: 10px;">[SYSTEM] Initializing Archive Access...</div>
  <div id="typing-text" style="color: #e8ebf1; min-height: 1.5em;"></div>
</div>

<script>
  const text = "> Accessing BBlackNose's Decrypted Archives... [SUCCESS]";
  let i = 0;
  function type() {
    if (i < text.length) {
      document.getElementById("typing-text").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 50);
    }
  }
  window.onload = type;
</script>
