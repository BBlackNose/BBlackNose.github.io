# Site Settings
title: "BBlackNose Archive"
locale: "ko-KR"
description: "Security Engineering & CTF Artifacts"
url: "https://BBlackNose.github.io"
baseurl: ""

# Theme Settings
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "neon"

# Author
author:
  name: "BBlackNose"
  bio: "Security Engineer | CTF Player"
  location: "In the Shell"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/BBlackNose"
    - label: "Dreamhack"
      icon: "fas fa-fw fa-flag"
      url: "https://dreamhack.games"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

# Taxonomy
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
